name: Generate Daily Question

on:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: queryveda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: queryveda/package-lock.json

      - name: Generate daily question
        run: node scripts/generate-daily-question.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push if changed
        run: |
          git diff --quiet public/daily-question.json && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily-question.json
          git commit -m "chore: generate daily question for $(date -u +%Y-%m-%d)"
          git push

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_BASE_PATH: /sql-practice

      - run: touch out/.nojekyll
      - run: cp out/404/index.html out/404.html || true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: queryveda/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: generate-and-deploy
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
