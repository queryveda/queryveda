name: Generate Daily Question

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: queryveda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily question
        run: node scripts/generate-daily-question.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet public/daily-question.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/daily-question.json
          git commit -m "chore: generate daily question for $(date -u +%Y-%m-%d)"
          git push
