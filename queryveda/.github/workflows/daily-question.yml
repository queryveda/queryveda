name: Generate Daily Question

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: queryveda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily question
        run: node scripts/generate-daily-question.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push if changed
        run: |
          git diff --quiet public/daily-question.json && echo "No changes" && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily-question.json
          git commit -m "chore: generate daily question for $(date -u +%Y-%m-%d)"
          git push

      - name: Trigger deploy
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: .
