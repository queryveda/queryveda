<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Practice — QueryVeda</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/theme/dracula.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/sql/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/edit/closebrackets.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/comment/comment.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/addon/hint/sql-hint.min.js"></script>
  <style>
    .practice-topbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      padding: 8px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }
    .back-link {
      font-size: 13px;
      color: var(--accent);
      font-weight: 500;
    }
    .back-link:hover { text-decoration: underline; }
    .question-info { flex: 1; display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .q-title { font-size: 15px; font-weight: 700; }
    .topbar-nav { display: flex; align-items: center; gap: 8px; }
    .status-text { font-size: 13px; color: var(--text-muted); }

    .wrap { display: grid; grid-template-columns: 380px 6px 1fr; gap: 0; height: calc(100vh - 120px); }
    .resizer { background: var(--border); cursor: col-resize; position: relative; z-index: 10; transition: background .15s; }
    .resizer:hover, .resizer.active { background: var(--accent); }
    .left { overflow: auto; padding: 16px; background: var(--bg-secondary); }
    .right { overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
    @media (max-width: 768px) {
      .wrap { grid-template-columns: 1fr !important; height: auto; }
      .left { border-bottom: 1px solid var(--border); }
      .resizer { display: none; }
    }
    h2 { font-size: 14px; margin: 18px 0 6px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; }
    .desc { font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
    .note { font-size: 12.5px; color: var(--text-muted); background: var(--bg-hover); padding: 8px 10px; border-radius: 6px; margin-top: 8px; }
    .CodeMirror { height: 220px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .practice-topbar button, .bar button {
      font-size: 14px; padding: 9px 18px; border: none; border-radius: 8px;
      cursor: pointer; background: var(--accent); color: #fff; font-weight: 600;
    }
    .practice-topbar button.sec, .bar button.sec {
      background: var(--bg-hover); color: var(--text-primary);
      border: 1px solid var(--border);
    }
    button:disabled { opacity: .5; cursor: default; }
    .verdict { font-size: 15px; font-weight: 700; padding: 10px 14px; border-radius: 8px; }
    .pass { background: var(--success-bg); color: var(--success); border: 1px solid var(--success-border); }
    .fail { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-border); }
    .err  { background: var(--warning-bg); color: var(--warning); border: 1px solid var(--warning-border); font-family: ui-monospace, monospace; font-size: 13px; white-space: pre-wrap; }
    table { border-collapse: collapse; font-size: 13px; background: var(--bg-secondary); }
    th, td { border: 1px solid var(--border); padding: 5px 9px; text-align: left; white-space: nowrap; }
    th { background: var(--bg-hover); color: var(--text-primary); }
    td { color: var(--text-secondary); }
    .tblbox { overflow: auto; max-width: 100%; }
    .label { font-size: 12px; color: var(--text-muted); margin: 10px 0 4px; font-weight: 600; }
    .null { color: var(--text-muted); font-style: italic; }
    code { background: var(--code-bg); padding: 1px 5px; border-radius: 4px; }
    .solution-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 14px; margin-top: 10px; }
    .solution-box h3 { margin: 0 0 8px; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .04em; }
    .solution-box pre { background: var(--code-bg); color: var(--text-primary); padding: 12px; border-radius: 6px; font-size: 13px; overflow-x: auto; margin: 6px 0; white-space: pre-wrap; font-family: ui-monospace, Menlo, Consolas, monospace; }
    .solution-box .tip { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-top: 8px; }
    .solution-box .tip strong { color: var(--accent); }
    button.hint { background: #7c3aed; }
    button.hint:hover { background: #6d28d9; }
    .hints-bar { display: flex; align-items: center; gap: 8px; }
    .hints-bar button { font-size: 12px; padding: 5px 12px; background: var(--warning); color: #fff; border-radius: 6px; }
    .hints-bar button:hover { background: #d97706; }
    .hints-bar .hint-count { font-size: 12px; color: var(--text-muted); }
    .hint-item { font-size: 13px; padding: 8px 12px; margin-top: 6px; background: var(--warning-bg); border: 1px solid var(--warning-border); border-radius: 6px; color: var(--warning); line-height: 1.5; }
    .hint-item strong { color: var(--warning); }
  </style>
</head>
<body>
  <div class="practice-topbar">
    <a href="problems.html" class="back-link">&larr; Problems</a>
    <div class="question-info">
      <span id="qTitle" class="q-title"></span>
      <span id="qBadges"></span>
    </div>
    <div class="topbar-nav">
      <span id="status" class="status-text">starting Postgres&hellip;</span>
      <button id="prev" class="sec">&larr; Prev</button>
      <button id="next" class="sec">Next &rarr;</button>
    </div>
  </div>

  <div class="wrap">
    <div class="left">
      <div id="desc" class="desc"></div>
      <div id="noteBox"></div>
      <h2>Tables &amp; data</h2>
      <div id="tables"></div>
      <h2>Expected output</h2>
      <div id="expected" class="tblbox"></div>
    </div>
    <div class="resizer" id="resizer"></div>
    <div class="right">
      <div class="bar">
        <button id="run" disabled>Run &amp; Check &#9654;</button>
        <button id="clear" class="sec">Clear</button>
        <span style="font-size:12px;color:var(--text-muted)">Ctrl/Cmd + Enter to run &middot; Hidden test cases verify your solution</span>
      </div>
      <div id="hintsArea"></div>
      <div id="sql"></div>
      <div id="verdict"></div>
      <div id="result"></div>
      <div id="solutionArea"></div>
    </div>
  </div>

  <script src="js/protect.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/nav.js"></script>
  <script>
    /* ============ ENGINE ============ */
    let db = null;
    let editor = null;
    let currentHintTables = {};
    let currentQuestion = null;
    const $ = id => document.getElementById(id);

    // Question ordering for prev/next
    const diffOrder = { Easy: 0, Medium: 1, Hard: 2 };
    const sortedQs = [...Q].sort((a, b) => {
      const ti = TOPICS.indexOf(a.topic) - TOPICS.indexOf(b.topic);
      if (ti !== 0) return ti;
      const di = diffOrder[a.difficulty] - diffOrder[b.difficulty];
      if (di !== 0) return di;
      return a.id - b.id;
    });

    function getQById(id) { return Q.find(q => q.id === id); }

    function currentSortedIndex() {
      return sortedQs.findIndex(q => q.id === currentQuestion.id);
    }

    function navigateTo(q) {
      currentQuestion = q;
      history.replaceState(null, "", "practice.html?id=" + q.id);
      loadQuestion(q);
    }

    async function loadPGlite(){
      const urls = ["./pglite/index.js","https://cdn.jsdelivr.net/npm/@electric-sql/pglite/dist/index.js"];
      for (const u of urls){
        try { const m = await import(u); if (m.PGlite) return m.PGlite; } catch(e){ console.warn("PGlite load failed:", u, e); }
      }
      throw new Error("Could not load PGlite. Make sure the 'pglite' folder sits next to practice.html and that you opened the page via 'python3 run.py' (not by double-clicking the file).");
    }

    function fmtDate(v){
      const p = n => String(n).padStart(2,"0");
      const Y=v.getFullYear(), M=p(v.getMonth()+1), D=p(v.getDate());
      const h=v.getHours(), mi=v.getMinutes(), s=v.getSeconds();
      if (h||mi||s) return `${Y}-${M}-${D} ${p(h)}:${p(mi)}:${p(s)}`;
      return `${Y}-${M}-${D}`;
    }
    function disp(v){
      if (v===null || v===undefined) return null;
      if (v instanceof Date) return fmtDate(v);
      return String(v);
    }
    function norm(v){
      if (v===null || v===undefined) return "\u2205";
      let s = (v instanceof Date) ? fmtDate(v) : String(v);
      s = s.trim();
      if (/^-?\d+(\.\d+)?$/.test(s)) return String(Math.round(parseFloat(s)*10000)/10000);
      return s.toLowerCase();
    }
    function esc(s){ return String(s).replace(/[&<>]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }

    function tableHTML(cols, rows){
      let h = "<table><thead><tr>" + cols.map(c=>"<th>"+esc(c)+"</th>").join("") + "</tr></thead><tbody>";
      if (!rows.length) h += "<tr><td colspan='"+cols.length+"' style='color:var(--text-muted)'>(no rows)</td></tr>";
      for (const r of rows){
        h += "<tr>" + r.map(v => v===null||v===undefined
            ? "<td class='null'>NULL</td>"
            : "<td>"+esc(disp(v))+"</td>").join("") + "</tr>";
      }
      return h + "</tbody></table>";
    }

    function compare(exp, act){
      const ec = exp.cols.length;
      if (act.rows.length && act.rows[0].length !== ec)
        return {pass:false, msg:`Column count mismatch: expected ${ec} column(s), got ${act.rows[0].length}. Expected order: ${exp.cols.join(", ")}.`};
      if (act.rows.length === 0 && exp.rows.length > 0)
        return {pass:false, msg:"Your query returned 0 rows."};
      if (act.rows.length !== exp.rows.length)
        return {pass:false, msg:`Row count mismatch: expected ${exp.rows.length}, got ${act.rows.length}.`};
      const key = r => r.map(norm).join("\u0001");
      const e = exp.rows.map(key).sort();
      const a = act.rows.map(key).sort();
      for (let i=0;i<e.length;i++) if (e[i]!==a[i])
        return {pass:false, msg:"Values don't match the expected output (compared independent of row order)."};
      return {pass:true, msg:"All rows match. \u2714"};
    }

    async function showTables(q){
      let h = "";
      currentHintTables = {};
      for (const t of q.tables){
        const res = await db.query(`SELECT * FROM ${t}`);
        const cols = res.fields.map(f=>f.name);
        currentHintTables[t] = cols;
        const rows = res.rows.map(r=>cols.map(c=>r[c]));
        h += `<div class="label">${esc(t)}</div><div class="tblbox">${tableHTML(cols,rows)}</div>`;
      }
      $("tables").innerHTML = h;
      if (editor) editor.setOption("hintOptions", { tables: currentHintTables, completeSingle: false });
    }

    let currentHintsRevealed = 0;

    function renderHints(q){
      const hints = q.hints || [];
      if (!hints.length) { $("hintsArea").innerHTML = ""; return; }
      let html = `<div class="hints-bar">`;
      html += `<button id="hintBtn">Get a Hint</button>`;
      html += `<span class="hint-count" id="hintCount">${currentHintsRevealed}/${hints.length} hints used</span>`;
      html += `</div>`;
      html += `<div id="hintsList">`;
      for (let i = 0; i < currentHintsRevealed; i++) {
        html += `<div class="hint-item"><strong>Hint ${i+1}:</strong> ${esc(hints[i])}</div>`;
      }
      html += `</div>`;
      $("hintsArea").innerHTML = html;
      $("hintBtn").addEventListener("click", revealNextHint);
    }

    function revealNextHint(){
      if (!currentQuestion) return;
      const hints = currentQuestion.hints || [];
      if (currentHintsRevealed >= hints.length) return;
      currentHintsRevealed++;
      const list = $("hintsList");
      const div = document.createElement("div");
      div.className = "hint-item";
      div.innerHTML = `<strong>Hint ${currentHintsRevealed}:</strong> ${esc(hints[currentHintsRevealed-1])}`;
      list.appendChild(div);
      $("hintCount").textContent = `${currentHintsRevealed}/${hints.length} hints used`;
    }

    async function loadQuestion(q){
      currentQuestion = q;
      // Update top bar
      $("qTitle").textContent = q.title;
      const diffClass = q.difficulty.toLowerCase();
      $("qBadges").innerHTML = `<span class="pill pill-${diffClass}">${q.difficulty}</span> <span class="topic-pill" style="border-color:${TOPIC_COLORS[q.topic]};color:${TOPIC_COLORS[q.topic]}">${q.topic}</span>`;

      $("desc").textContent = q.desc;
      $("noteBox").innerHTML = q.note ? `<div class="note">\u2139\uFE0F ${esc(q.note)}</div>` : "";
      $("expected").innerHTML = tableHTML(q.cols, q.rows);
      $("verdict").innerHTML = "";
      $("result").innerHTML = "";
      $("solutionArea").innerHTML = "";
      currentHintsRevealed = 0;
      renderHints(q);
      if (editor) {
        const saved = Storage.getSavedSQL(q.id);
        editor.setValue(saved || "");
      }
      try {
        await db.exec(q.setup);
        await showTables(q);
      } catch(e){
        $("tables").innerHTML = `<div class="err">Setup error: ${esc(e.message)}</div>`;
      }
    }

    function showSolutionButton(q, passed) {
      if (!q.solution) { $("solutionArea").innerHTML = ""; return; }
      const sol = q.optSolution || q.solution;
      let html = `<button class="hint" id="showSolBtn">`;
      html += passed ? `Show Optimized Solution & Tips` : `Show Solution & Tips`;
      html += `</button>`;
      html += `<div id="solDetail" style="display:none"><div class="solution-box">`;
      html += `<h3>Optimized Solution</h3><pre>${esc(sol.trim())}</pre>`;
      html += `<div class="tip"><strong>Optimization Tips:</strong> ${esc(q.tips)}</div>`;
      html += `</div></div>`;
      $("solutionArea").innerHTML = html;
      $("showSolBtn").addEventListener("click", function() {
        $("solDetail").style.display = "block";
        this.style.display = "none";
      });
    }

    async function run(){
      if (!currentQuestion) return;
      const q = currentQuestion;
      let sql = editor.getValue().trim().replace(/;\s*$/,"");
      if (!sql){ $("verdict").innerHTML = `<div class="verdict err">Write a query first.</div>`; return; }
      $("verdict").innerHTML = `<div class="verdict" style="background:var(--bg-hover);color:var(--text-secondary)">Running\u2026</div>`;
      $("result").innerHTML = "";
      $("solutionArea").innerHTML = "";

      try { await db.exec(q.setup); } catch(e){
        $("verdict").innerHTML = `<div class="verdict err">Setup error: ${esc(e.message)}</div>`; return;
      }
      let res;
      try { res = await db.query(sql); }
      catch(e){
        $("verdict").innerHTML = `<div class="verdict err">SQL error: ${esc(e.message)}</div>`; return;
      }
      const cols = res.fields.map(f=>f.name);
      const rows = res.rows.map(r=>cols.map(c=>r[c]));
      const v = compare(q, {cols, rows});

      if (!v.pass) {
        Storage.markAttempted(q.id);
        $("verdict").innerHTML = `<div class="verdict fail">\u274C Not quite. ${esc(v.msg)}</div>`;
        $("result").innerHTML =
          `<div class="label">Your output</div><div class="tblbox">${tableHTML(cols,rows)}</div>` +
          `<div class="label">Expected output</div><div class="tblbox">${tableHTML(q.cols,q.rows)}</div>`;
        showSolutionButton(q, false);
        return;
      }

      const hiddenTests = q.tests || [];
      let allPassed = true;
      let failedTestNum = 0;
      let failMsg = "";
      for (let i = 0; i < hiddenTests.length; i++) {
        const tc = hiddenTests[i];
        try { await db.exec(tc.setup); } catch(e){
          allPassed = false; failedTestNum = i+2; failMsg = `Setup error in hidden test: ${e.message}`; break;
        }
        let tr;
        try { tr = await db.query(sql); } catch(e){
          allPassed = false; failedTestNum = i+2; failMsg = `SQL error on hidden test case ${i+2}: ${e.message}`; break;
        }
        const tcols = tr.fields.map(f=>f.name);
        const trows = tr.rows.map(r=>tcols.map(c=>r[c]));
        const tv = compare({cols:q.cols, rows:tc.rows}, {cols:tcols, rows:trows});
        if (!tv.pass) {
          allPassed = false; failedTestNum = i+2;
          failMsg = `Passed visible test but failed hidden test case ${i+2}. ${tv.msg} Your query may be hardcoded for the sample data.`;
          break;
        }
      }

      try { await db.exec(q.setup); await showTables(q); } catch(e){}

      if (allPassed) {
        const totalTests = 1 + hiddenTests.length;
        $("verdict").innerHTML = `<div class="verdict pass">\u2705 Correct! All ${totalTests} test case${totalTests>1?"s":""} passed. ${esc(v.msg)}</div>`;
        $("result").innerHTML = `<div class="label">Your output</div><div class="tblbox">${tableHTML(cols,rows)}</div>`;
        Storage.markSolved(q.id);
      } else {
        Storage.markAttempted(q.id);
        $("verdict").innerHTML = `<div class="verdict fail">\u274C ${esc(failMsg)}</div>`;
        $("result").innerHTML = `<div class="label">Your output (visible test)</div><div class="tblbox">${tableHTML(cols,rows)}</div>`;
      }
      showSolutionButton(q, allPassed);
    }

    function initResizer(){
      const resizer = $("resizer");
      const wrap = document.querySelector(".wrap");
      let startX, startWidth;
      resizer.addEventListener("mousedown", e=>{
        e.preventDefault();
        startX = e.clientX;
        startWidth = document.querySelector(".left").getBoundingClientRect().width;
        resizer.classList.add("active");
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
      function onMove(e){
        const newW = Math.max(200, Math.min(startWidth + e.clientX - startX, window.innerWidth - 300));
        wrap.style.gridTemplateColumns = newW + "px 6px 1fr";
      }
      function onUp(){
        resizer.classList.remove("active");
        document.removeEventListener("mousemove", onMove);
        document.removeEventListener("mouseup", onUp);
      }
    }

    // Prev/Next handlers
    $("prev").addEventListener("click", () => {
      const i = currentSortedIndex();
      if (i > 0) navigateTo(sortedQs[i - 1]);
    });
    $("next").addEventListener("click", () => {
      const i = currentSortedIndex();
      if (i < sortedQs.length - 1) navigateTo(sortedQs[i + 1]);
    });

    async function main(){
      Nav.init();
      initResizer();

      // Initial load from URL
      const params = new URLSearchParams(location.search);
      const startId = parseInt(params.get("id")) || sortedQs[0].id;
      currentQuestion = getQById(startId) || sortedQs[0];
      history.replaceState(null, "", "practice.html?id=" + currentQuestion.id);

      try {
        const PGlite = await loadPGlite();
        db = new PGlite();
        await db.query("SELECT 1");
        $("status").textContent = "Postgres ready \u2713";
        $("run").disabled = false;
      } catch(e){
        $("status").textContent = "\u26A0 failed to start";
        $("desc").innerHTML = `<div class="err">${esc(e.message)}</div>`;
        return;
      }

      editor = CodeMirror($("sql"), {
        mode: "text/x-pgsql",
        theme: "dracula",
        lineNumbers: true,
        autoCloseBrackets: true,
        indentWithTabs: false,
        indentUnit: 2,
        tabSize: 2,
        placeholder: "-- write your PostgreSQL query here\nSELECT ...",
        extraKeys: {
          "Ctrl-Enter": run,
          "Cmd-Enter": run,
          "Ctrl-Space": "autocomplete",
          "Cmd-/": "toggleComment",
          "Ctrl-/": "toggleComment",
          "Tab": (cm) => {
            if (cm.somethingSelected()) cm.indentSelection("add");
            else cm.replaceSelection("  ", "end");
          }
        },
        hintOptions: { tables: currentHintTables, completeSingle: false }
      });
      // Block paste and drop — only allow typing
      editor.on("beforeChange", (cm, change) => {
        if (change.origin === "paste" || change.origin === "drop") {
          change.cancel();
        }
      });
      // Also block at DOM level to catch all paste vectors
      editor.getWrapperElement().addEventListener("paste", e => {
        e.preventDefault();
        e.stopPropagation();
      }, true);
      editor.getWrapperElement().addEventListener("drop", e => {
        e.preventDefault();
        e.stopPropagation();
      }, true);
      editor.on("inputRead", (cm, change) => {
        if (change.origin !== "+input") return;
        const ch = change.text[0];
        if (/[a-zA-Z_.]/.test(ch)) {
          cm.showHint({ completeSingle: false });
        }
      });
      editor.on("change", ()=>{
        if (!currentQuestion) return;
        Storage.saveSQL(currentQuestion.id, editor.getValue());
        if (editor.getValue().trim()) Storage.markAttempted(currentQuestion.id);
      });

      $("run").addEventListener("click", run);
      $("clear").addEventListener("click", ()=>{
        editor.setValue("");
        $("verdict").innerHTML="";
        $("result").innerHTML="";
        $("solutionArea").innerHTML="";
      });

      // Load the initial question
      await loadQuestion(currentQuestion);
    }
    main();
  </script>
</body>
</html>
