<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">
  <title>QueryVeda — Master SQL by Doing</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hero {
      text-align: center;
      padding: 90px 24px 56px;
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 40%, rgba(59,130,246,0.06) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(139,92,246,0.05) 0%, transparent 50%);
      animation: heroFloat 20s ease-in-out infinite alternate;
      pointer-events: none;
    }
    @keyframes heroFloat {
      from { transform: translate(0, 0) rotate(0deg); }
      to { transform: translate(2%, -2%) rotate(3deg); }
    }
    .hero h1 {
      font-size: 52px;
      font-weight: 900;
      margin-bottom: 18px;
      letter-spacing: -0.04em;
      line-height: 1.05;
      background: linear-gradient(135deg, var(--text-primary) 30%, var(--accent-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      position: relative;
    }
    .hero .subtitle {
      font-size: 18px;
      color: var(--text-secondary);
      margin-bottom: 10px;
      font-weight: 500;
      position: relative;
    }
    .hero p {
      font-size: 16px;
      color: var(--text-muted);
      margin-bottom: 36px;
      line-height: 1.55;
      position: relative;
    }
    .hero-cta {
      display: inline-block;
      background: var(--accent-gradient);
      color: #fff;
      padding: 15px 40px;
      border-radius: 13px;
      font-size: 16px;
      font-weight: 700;
      transition: all 0.25s;
      box-shadow: 0 4px 20px rgba(59,130,246,0.3);
      position: relative;
    }
    .hero-cta:hover { transform: translateY(-3px); box-shadow: 0 8px 28px rgba(59,130,246,0.4); }

    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 56px;
      padding: 32px 24px;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .stat {
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 36px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: var(--shadow-sm);
      text-decoration: none;
      display: block;
    }
    .stat:hover { transform: translateY(-3px); box-shadow: var(--shadow); }
    .stat-number { font-size: 32px; font-weight: 800; letter-spacing: -0.02em; }
    .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .stat-easy { border-bottom: 3px solid var(--success); }
    .stat-easy .stat-number { color: var(--success); }
    .stat-medium { border-bottom: 3px solid var(--warning); }
    .stat-medium .stat-number { color: var(--warning); }
    .stat-hard { border-bottom: 3px solid var(--danger); }
    .stat-hard .stat-number { color: var(--danger); }

    .topics-section {
      padding: 56px 24px;
    }
    .topics-section h2 {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 32px;
      letter-spacing: -0.025em;
    }
    .topic-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
      max-width: 1000px;
      margin: 0 auto;
    }
    .topic-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      border-left: 4px solid;
      box-shadow: var(--shadow-sm);
      position: relative;
      overflow: hidden;
    }
    .topic-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, transparent 60%, rgba(59,130,246,0.03) 100%);
      pointer-events: none;
      border-radius: 16px;
    }
    .topic-card:hover { transform: translateY(-4px); box-shadow: var(--shadow); }
    .topic-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 6px; letter-spacing: -0.01em; }
    .topic-card .topic-tags { font-size: 12px; color: var(--text-muted); margin-bottom: 14px; line-height: 1.5; }
    .topic-card .topic-progress-text {
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="app">
    <section class="hero">
      <h1>Master SQL by Doing</h1>
      <p class="subtitle">The hands-on way to become fluent in PostgreSQL</p>
      <p>75 curated problems &middot; Real database in your browser &middot; Instant feedback</p>
      <a href="practice.html" class="hero-cta">Start Practicing &rarr;</a>
    </section>

    <div class="stats-bar">
      <a href="problems.html?difficulty=Easy" class="stat stat-easy">
        <div class="stat-number" id="statEasy">0/25</div>
        <div class="stat-label">Easy</div>
      </a>
      <a href="problems.html?difficulty=Medium" class="stat stat-medium">
        <div class="stat-number" id="statMedium">0/25</div>
        <div class="stat-label">Medium</div>
      </a>
      <a href="problems.html?difficulty=Hard" class="stat stat-hard">
        <div class="stat-number" id="statHard">0/25</div>
        <div class="stat-label">Hard</div>
      </a>
    </div>

    <section class="topics-section">
      <h2>Browse by Topic</h2>
      <div class="topic-grid" id="topicGrid"></div>
    </section>
  </div>

  <script src="js/protect.js"></script>
  <script src="js/questions.js"></script>
  <script src="js/storage.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/nav.js"></script>
  <script>
    (async () => {
    await Auth.init();
    Nav.init();
    await Storage.syncFromCloud();

    // Stats bar
    ["Easy", "Medium", "Hard"].forEach(d => {
      const s = Storage.countByDifficulty(Q, d);
      document.getElementById("stat" + d).textContent = s.solved + "/" + s.total;
    });

    // Topic grid
    const grid = document.getElementById("topicGrid");
    const topicTags = {
      "Aggregations & JOINs": "GROUP BY \u00B7 HAVING \u00B7 JOINs \u00B7 Subqueries \u00B7 EXISTS",
      "Window Functions": "ROW_NUMBER \u00B7 RANK \u00B7 DENSE_RANK \u00B7 LAG \u00B7 LEAD",
      "Cumulative & Sliding Windows": "Running totals \u00B7 Moving averages \u00B7 Frame specs",
      "Consecutive Sequences": "Islands & gaps \u00B7 Streaks \u00B7 Sessionization",
      "Advanced Analytics": "Sweep line \u00B7 Retention \u00B7 Funnels \u00B7 Cohort analysis"
    };

    TOPICS.forEach(topic => {
      const stats = Storage.countByTopic(Q, topic);
      const color = TOPIC_COLORS[topic];
      const pct = stats.total ? Math.round(100 * stats.solved / stats.total) : 0;
      const card = document.createElement("a");
      card.href = "problems.html?topic=" + encodeURIComponent(topic);
      card.className = "topic-card";
      card.style.borderLeftColor = color;
      card.innerHTML = `
        <h3>${topic}</h3>
        <div class="topic-tags">${topicTags[topic] || ""}</div>
        <div class="topic-progress-text">${stats.solved}/${stats.total} solved</div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div>
        </div>
      `;
      grid.appendChild(card);
    });
    })();
  </script>
</body>
</html>
