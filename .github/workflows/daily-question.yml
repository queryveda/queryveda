name: Generate Daily Question

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  generate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: queryveda
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate daily question
        run: node scripts/generate-daily-question.mjs
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit and push
        id: push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/daily-question.json
          if git diff --cached --quiet; then
            echo "No changes"
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update daily question for $(date -u +%Y-%m-%d)"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

      # Deploy is triggered automatically by the push-to-main trigger in deploy.yml
